services:
  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 8788
      WEB_DIST_DIR: /app/dist/apps/web
      RUNTIME_STATE_PATH: /app/data/runtime-state.json
    expose:
      - "8788"
    volumes:
      - ./data:/app/data

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-:80}
    ports:
      - "${HTTP_PORT:-8088}:80"
      - "${HTTPS_PORT:-8444}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
