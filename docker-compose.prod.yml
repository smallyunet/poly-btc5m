services:
  api:
    build:
      context: .
      target: api
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      PORT: 8788
      WEB_DIST_DIR: /app/dist/apps/web
      RUNTIME_STATE_PATH: /app/data/runtime-state.json
    expose:
      - "8788"
    volumes:
      - ./data:/app/data
      - ./data-lab:/app/data-lab

  pm5m-touch-recorder:
    build:
      context: .
      target: api
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    environment:
      NODE_ENV: production
    command:
      - npm
      - run
      - research:pm5m-touch
      - --
      - --assets
      - btc
      - --min-price
      - "0.29"
      - --max-price
      - "0.49"
    volumes:
      - ./data-lab:/app/data-lab

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-:80}
    ports:
      - "${HTTP_PORT:-8088}:80"
      - "${HTTPS_PORT:-8444}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
