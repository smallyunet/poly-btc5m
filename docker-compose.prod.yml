services:
  api:
    build:
      context: .
      target: api
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      APP_VERSION: ${APP_VERSION:-0.1.0}
      GIT_SHA: ${GIT_SHA:-unknown}
      BUILD_TIME: ${BUILD_TIME:-unknown}
      PORT: 8788
      WEB_DIST_DIR: /app/dist/apps/web
      RUNTIME_STATE_PATH: /app/data/runtime-state.json
    expose:
      - "8788"
    volumes:
      - ./data:/app/data
      - ./data-lab:/app/data-lab

  pm5m-touch-recorder:
    build:
      context: .
      target: api
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    command:
      - npm
      - run
      - research:pm5m-touch
      - --
      - --assets
      - btc,eth,sol,doge,xrp,hype
      - --interval
      - 5m
      - --min-price
      - "0.29"
      - --max-price
      - "0.49"
    volumes:
      - ./data-lab:/app/data-lab

  pm15m-touch-recorder:
    build:
      context: .
      target: api
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    command:
      - npm
      - run
      - research:pm5m-touch
      - --
      - --assets
      - btc,eth,sol,doge,xrp,hype
      - --interval
      - 15m
      - --min-price
      - "0.29"
      - --max-price
      - "0.49"
    volumes:
      - ./data-lab:/app/data-lab

  pm1h-touch-recorder:
    build:
      context: .
      target: api
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    command:
      - npm
      - run
      - research:pm5m-touch
      - --
      - --assets
      - btc,eth,sol,doge,xrp,hype
      - --interval
      - 1h
      - --min-price
      - "0.29"
      - --max-price
      - "0.49"
    volumes:
      - ./data-lab:/app/data-lab

  pm5m-tail-recorder:
    build:
      context: .
      target: api
      args:
        APP_VERSION: ${APP_VERSION:-0.1.0}
        GIT_SHA: ${GIT_SHA:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
    command:
      - npm
      - run
      - research:pm5m-tail
      - --
      - --assets
      - btc,eth,sol,doge,xrp,hype
      - --interval
      - 5m
      - --checkpoints
      - "60,45,30,20,15,10,5"
      - --size
      - "${PM5M_TAIL_SIZE:-2}"
      - --lookback-hours
      - "${PM5M_TAIL_LOOKBACK_HOURS:-12}"
    volumes:
      - ./data-lab:/app/data-lab

  pm15m-tail-recorder:
    extends:
      service: pm5m-tail-recorder
    command:
      - npm
      - run
      - research:pm5m-tail
      - --
      - --assets
      - btc
      - --interval
      - 15m
      - --checkpoints
      - "60,45,30,20,15,10,5"
      - --size
      - "${PM5M_TAIL_SIZE:-2}"
      - --lookback-hours
      - "${PM15M_TAIL_LOOKBACK_HOURS:-48}"

  pm1h-tail-recorder:
    extends:
      service: pm5m-tail-recorder
    command:
      - npm
      - run
      - research:pm5m-tail
      - --
      - --assets
      - btc
      - --interval
      - 1h
      - --checkpoints
      - "60,45,30,20,15,10,5"
      - --size
      - "${PM5M_TAIL_SIZE:-2}"
      - --lookback-hours
      - "${PM1H_TAIL_LOOKBACK_HOURS:-168}"

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - api
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN:-:80}
    ports:
      - "${HTTP_PORT:-8088}:80"
      - "${HTTPS_PORT:-8444}:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs:/certs:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
